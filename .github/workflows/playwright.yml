name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions: # 👈 중요: Pages 배포를 위해 쓰기 권한이 필요합니다.
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    # 1. 테스트 리포트 아티팩트로 저장 (기존 유지)
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # 2. ✨ 핵심: 리포트를 웹사이트(GitHub Pages)로 자동 배포
    - name: Deploy to GitHub Pages
      if: always() # 성공/실패 여부 상관없이 리포트는 공개되어야 합니다.
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: playwright-report

    # 3. 🚨 슬랙 알림 (들여쓰기 수정 완료)
    - name: Slack Notification on Failure
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_COLOR: '#ff0000'
        SLACK_MESSAGE: '❌ 카카오 이모티콘 테스트 실패! 리포트 확인: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/'
        SLACK_TITLE: 'Playwright Test Failed'
